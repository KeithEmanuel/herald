# Herald — compose.yaml
#
# Herald runs as an independent service, separate from your main docker stack.
# It manages project containers via the Docker socket.
#
# Directory layout on the host (HERALD_ROOT = the dir containing this file):
#
#   HERALD_ROOT/
#     compose.yaml             ← this file
#     .env                     ← secrets (copy from repos/herald/.env.example)
#     projects/                ← private YAML configs, written by !addproject
#     repos/
#       herald/                ← git clone of Herald source (what agents edit)
#       <other-project>/       ← other project repos live here too
#     deployments/             ← project docker compose stacks
#       <project>/
#         compose.yaml
#
# Setup:
#   1. mkdir $HERALD_ROOT && cd $HERALD_ROOT
#   2. git clone <herald-repo> repos/herald
#   3. cp repos/herald/.env.example .env  # then fill in values
#   4. mkdir -p projects deployments
#   5. docker network create caddy_net    # shared network for Caddy + project containers
#   6. docker compose up -d
#   7. docker compose exec herald claude  # authenticate Claude Code (first time only)
#
# Usage:
#   docker compose logs -f herald
#   docker compose restart herald

services:
  herald:
    build:
      context: ./repos/herald
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Projects registry is always at /herald/projects inside the container.
      # Bind-mounted from ./projects (relative to this file) — see volumes below.
      HERALD_PROJECTS_DIR: /herald/projects
      # ANTHROPIC_API_KEY and DISCORD_TOKEN come from .env
    restart: unless-stopped
    volumes:
      # Project registry — private YAML configs, written by !addproject
      - ./projects:/herald/projects:rw

      # Docker socket — Herald uses this to run `docker compose up --build -d`
      # for project containers. This grants Herald full control over host Docker.
      # Required for !deploy and auto_deploy_on_push to work.
      - /var/run/docker.sock:/var/run/docker.sock

      # Repos and deployments — mounted at the SAME absolute path as the host.
      # The Docker daemon resolves compose file paths from the host perspective,
      # so paths must match on both sides. HERALD_ROOT must be absolute in .env.
      - ${HERALD_ROOT}/repos:${HERALD_ROOT}/repos:rw
      - ${HERALD_ROOT}/deployments:${HERALD_ROOT}/deployments:rw

      # Activity data — persists accountability tracking across container restarts.
      # Without this, the inactivity clock resets every time Herald restarts.
      - herald_data:/app/data

      # Git credentials — needed if agents push to remote repos (GitHub releases, etc.)
      # Bind-mounting ~/.gitconfig and ~/.ssh is the simplest approach.
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro

      # Claude Code authentication — persists login across container restarts.
      - herald_claude_config:/root/.config/claude

      # Claude Code auto-memory — persists agent memory files across container restarts.
      # SOUL.md in each project repo is the primary memory; this is supplementary.
      - herald_claude_memory:/root/.claude

volumes:
  herald_data:
  herald_claude_config:
  herald_claude_memory:
