# Herald project config — example / template
#
# Copy this file to projects/<yourproject>.yaml and fill it in.
# All projects/*.yaml files are gitignored except this one.
#
# Required fields: name, display_name, path, discord_channel_id

name: myproject
display_name: "My Project"

# Absolute path to the project repo inside the Herald container.
# Project repos live under HERALD_ROOT/repos/ and are mounted at the same path.
# Use !addproject to register automatically — or fill this in manually.
path: /srv/herald/repos/myproject

# Discord channel ID for this project.
# Created automatically by !addproject, or:
# Right-click a channel in Discord → "Copy Channel ID"
# (requires Developer Mode: User Settings → Advanced → Developer Mode)
discord_channel_id: "YOUR_CHANNEL_ID_HERE"

# Optional: per-agent Discord identity.
# !addproject sets these automatically when you attach an avatar image.
# To update the webhook later: !webhook myproject  (attach new image for avatar)
agent_name: "Argent"            # display name used when posting via webhook
# webhook_url: null             # fallback static URL; Herald stores the dynamic URL in data/webhooks.json
# webhook_avatar_url: null      # URL for per-post avatar override — usually leave null

# Optional: Claude model override for this project's agent runs.
# Empty / omitted = use the Claude Code CLI's built-in default model.
# Examples: "claude-opus-4-5" (most capable), "claude-haiku-4-5-20251001" (fastest/cheapest)
# Passed to the CLI as: --model <value>
# model: "claude-opus-4-5"

# Optional: cap on agentic iterations per run. Prevents runaway tasks that loop too long.
# 0 / omitted = Claude Code default (no explicit cap).
# Passed to the CLI as: --max-turns <value>
# max_turns: 10

git:
  # If true, the Claude agent may commit locally during a run.
  # Commits are always local until the owner approves a push via Discord reaction.
  auto_commit: true

  # If true, Herald posts a push-approval request before any git push.
  # Owner reacts 👍 to push or 👎 to discard the branch.
  push_requires_approval: true

  # All agent commits go to branches with this prefix.
  # Use "agent/<name>" so branches are namespaced per project.
  # Example result: agent/myproject-20260224-080000
  branch_prefix: "agent/myproject"

# Docker deployment config. Optional — omit if you don't want Herald to manage deploys.
#
# Herald deploys by running: docker compose -f <compose_path> up --build -d
# The Docker socket must be mounted in Herald's container (see Herald's compose.yaml).
#
# Project containers communicate with Caddy via a shared external Docker network (caddy_net).
# Create it once on the host: docker network create caddy_net
deploy:
  # Absolute path to this project's docker-compose file on the host.
  # Omit or leave null to disable Herald-managed deployment.
  compose_path: null  # e.g. /srv/herald/deployments/myproject/compose.yaml

  # If true, Herald automatically triggers a deploy after you approve a git push (👍).
  # If false (default), use !deploy myproject to deploy manually.
  auto_deploy_on_push: false

# ---------------------------------------------------------------------------
# Autonomous development mode (optional)
# ---------------------------------------------------------------------------
# When enabled, Herald checks daily whether you've been inactive. If so, the
# agent picks ONE unchecked roadmap item, implements it, commits locally, and
# posts a push proposal for you to review. The existing 👍/👎 flow handles
# everything — nothing ships without your approval.
#
# Budget is measured in wall-clock minutes per ISO week (resets Monday UTC).
# Autonomous runs do NOT update the accountability clock — that tracks your
# engagement, not the agent's.
#
# Enable from Discord: !autonomy myproject on 210
# Check status:        !autonomy myproject status
# Disable:             !autonomy myproject off
# ---------------------------------------------------------------------------
# autonomous:
#   enabled: false
#
#   # Wall-clock minutes the agent may use autonomously per week.
#   # Resets each ISO week (Monday midnight UTC).
#   weekly_minutes: 210         # ~3.5 hours
#
#   # Informational: minutes to reserve for your own use.
#   # Not enforced — your runs are never blocked. Shown in !autonomy status.
#   reserve_minutes: 90         # ~1.5 hours
#
#   # Minimum hours between autonomous runs. Spreads usage across the week.
#   min_gap_hours: 20
#
#   # Hard cap: autonomous runs per calendar day.
#   max_per_day: 1
#
#   # Files checked for unchecked roadmap items (- [ ] format), tried in order.
#   # If none have unchecked items, the run is skipped.
#   roadmap_paths:
#     - docs/roadmap.md
#     - ROADMAP.md
#     - TODO.md
#
#   # Custom task prompt. If omitted, uses Herald's built-in default:
#   # "Pick ONE unchecked roadmap item. Implement it. Commit. Summarize."
#   # task: ""
#
#   # Token budget: if > 0, limits autonomous runs by API token count (input + output)
#   # rather than wall-clock minutes. More precise — actual cost from the API.
#   # 0 = disabled; uses weekly_minutes as the budget instead.
#   # weekly_tokens: 500000      # ~500K tokens/week

# ---------------------------------------------------------------------------
# Cron-triggered tasks
# ---------------------------------------------------------------------------
# Cron format: minute hour day-of-month month day-of-week (5 fields)
# Multiple projects with the same cron time are staggered +15min automatically.
#
# Task prompts run via: cd <path> && claude -p "<task>" --print
# The agent reads CLAUDE.md, SOUL.md, and MEMORY.md for context.
# ---------------------------------------------------------------------------

schedule:
  # --- Daily: Morning reflection (5-10 min) ---
  # Keeps the agent's context fresh. Low cost, high value.
  - cron: "0 8 * * *"
    task: >
      Read SOUL.md and MEMORY.md. Check recent git log (last 5 commits).
      Write a brief status note: what's in progress, what's blocked, what needs
      attention today. Update MEMORY.md Short-Term if anything has changed.
      Post a 2-3 sentence summary as your response. Keep the whole thing under
      150 words of output.

  # --- Daily: Evening commit sweep ---
  # Catches uncommitted work-in-progress before it gets lost overnight.
  # - cron: "0 22 * * *"
  #   task: >
  #     Check for uncommitted or unstaged changes. If any look intentional
  #     (not junk files or build artifacts), stage and commit them with a clear
  #     message. Run tests if a test command is configured in CLAUDE.md.
  #     Report what you found — "nothing to commit" is a fine answer.

  # --- Weekly: Monday triage ---
  # Re-prioritizes the backlog at the start of each week.
  # - cron: "0 9 * * 1"
  #   task: >
  #     Read SOUL.md, MEMORY.md, and TASKS.md. Re-prioritize the backlog based
  #     on current project state. Move anything stale (no progress in 2+ weeks)
  #     to a Deferred section. Identify the top 3 things that should happen this
  #     week and post them to Discord as a short plan.

  # --- Weekly: Friday retrospective + blog post ---
  # Creates a written record of the week's work.
  # - cron: "0 17 * * 5"
  #   task: >
  #     Write a retrospective (200-400 words): what shipped, what didn't, what
  #     you learned, what surprised you. Save it as blog/YYYY-MM-DD-weekly.md
  #     (create the blog/ directory if it doesn't exist) and commit it.
  #     Update MEMORY.md with anything durable learned this week.
  #     Post a 2-3 sentence summary to Discord.

  # --- Monthly: Changelog review + memory prune ---
  # Keeps MEMORY.md lean and creates a monthly record.
  # - cron: "0 9 1 * *"
  #   task: >
  #     Read CHANGELOG.md and TASKS.md. Write a monthly summary (200-300 words):
  #     what shipped, how the project looks vs. a month ago, what next month
  #     should focus on. Save as blog/YYYY-MM-monthly.md and commit it.
  #     Prune stale Short-Term entries from MEMORY.md — anything more than
  #     2 weeks old that hasn't been promoted to Long-Term can be removed.

# ---------------------------------------------------------------------------
# One-off !run task templates (copy-paste into Discord)
# ---------------------------------------------------------------------------
#
# Do the work (open-ended session):
#   !run myproject Read SOUL.md and MEMORY.md. Check TASKS.md for the
#   highest-priority active item. Work on it. Commit any changes with a clear
#   message. Report what you did and what's next.
#
# Onboard a new project (creates SOUL.md from scratch):
#   Best results if you've written humans/<yourname>.md first — the agent uses it
#   to calibrate its name and personality to the project and operator.
#
#   !run myproject You are a new agent on this project. Read CLAUDE.md and explore
#   the codebase. Check humans/ for any contributor profiles. Write SOUL.md —
#   choose a name that fits this project and what you know about the people here
#   (any name is fine; Herald agents use heraldic tinctures, but that's a suggestion
#   not a rule). Write your role and a personality that reflects how you'll actually
#   work here. Write initial MEMORY.md Core Memories based on what you learn.
#   Introduce yourself with a short message.
#
# Documentation audit:
#   !run myproject Compare the codebase to the README and any docs/. Find
#   anything out of date, missing, or misleading. Update the docs to match
#   reality. Commit the changes with a summary of what you updated.
#
# Dependency audit:
#   !run myproject Check for outdated or vulnerable dependencies using the
#   appropriate tool for this stack. Report any high-severity issues to Discord.
#   Add anything that needs updating to TASKS.md.
#
# Code review pass:
#   !run myproject Review the last 10 commits. Look for: missing tests, unclear
#   variable names, functions doing too much, TODOs that should be tickets.
#   Write findings to TASKS.md under a "Code Review YYYY-MM-DD" section.
#   Report a 3-5 bullet summary.
#
# Security audit:
#   !run myproject Read SOUL.md and MEMORY.md. Do a security pass on the codebase:
#   check for hardcoded secrets, injection risks (SQL, shell, template), insecure
#   defaults, overly permissive configs, and dependencies with known CVEs. Use
#   whatever tools are appropriate for this stack. Write findings to TASKS.md
#   under "Security Audit YYYY-MM-DD" — severity (high/medium/low) and a brief
#   description for each. Report a summary to Discord.
#
# Code health sweep (maintenance / ownership):
#   !run myproject Read SOUL.md and MEMORY.md. Do a maintenance pass: check for
#   outdated dependencies, dead code, documentation drift (README vs. codebase),
#   and anything that should be a ticket but isn't. Update TASKS.md with anything
#   you find. If any dependency updates are safe to apply, apply them and commit.
#   Report what you did and what you left for the owner to decide.
